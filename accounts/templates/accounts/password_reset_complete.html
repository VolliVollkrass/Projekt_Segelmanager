{% extends "base.html" %}
{% load static %}
{% block title %}Passwort geändert{% endblock %}

{% block content %}
<div class="min-h-[calc(100vh-4rem)] flex flex-col items-center justify-center px-4 py-10">
    <div class="w-full max-w-sm text-center">

        <div class="mb-8">
            <img src="{% static 'medien/Logo_Meer_erleben.png' %}" alt="Logo" class="h-12 mx-auto mb-4">
            <div class="text-5xl mb-4">✅</div>
            <h1 class="text-2xl font-bold">Passwort geändert!</h1>
            <p class="text-base-content/60 mt-2 text-sm">
                Dein Passwort wurde erfolgreich aktualisiert. Du kannst dich jetzt anmelden.
            </p>
        </div>

        <a href="{% url 'login' %}" class="btn btn-primary w-full">
            Zum Login
        </a>

    </div>
</div>
{% endblock %}
