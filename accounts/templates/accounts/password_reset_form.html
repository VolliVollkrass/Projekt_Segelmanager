{% extends "base.html" %}
{% load static %}
{% block title %}Passwort zurücksetzen{% endblock %}

{% block content %}
<div class="min-h-[calc(100vh-4rem)] flex flex-col items-center justify-center px-4 py-10">
    <div class="w-full max-w-sm">

        <div class="text-center mb-8">
            <img src="{% static 'medien/Logo_Meer_erleben.png' %}" alt="Logo" class="h-12 mx-auto mb-4">
            <h1 class="text-2xl font-bold">Passwort vergessen?</h1>
            <p class="text-sm text-base-content/50 mt-1">Wir schicken dir einen Reset-Link per E-Mail</p>
        </div>

        <div class="card bg-base-100 shadow-xl border border-base-300">
            <div class="card-body gap-4">
                <form method="post" class="space-y-4">
                    {% csrf_token %}
                    <div class="form-control">
                        <label class="label pb-1">
                            <span class="label-text font-medium">E-Mail-Adresse</span>
                        </label>
                        <input type="email" name="email" required autofocus
                            class="input input-bordered w-full"
                            placeholder="deine@email.de">
                    </div>
                    <button type="submit" class="btn btn-primary w-full h-12 text-base">
                        Reset-Link senden
                    </button>
                </form>

                <p class="text-center text-sm text-base-content/60">
                    <a href="{% url 'login' %}" class="link link-primary font-medium">Zurück zum Login</a>
                </p>
            </div>
        </div>

    </div>
</div>
{% endblock %}
