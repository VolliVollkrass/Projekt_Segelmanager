{% extends "base.html" %}
{% load static %}
{% block title %}E-Mail bestätigen{% endblock %}

{% block content %}
<div class="min-h-[calc(100vh-4rem)] flex flex-col items-center justify-center px-4 py-10">
    <div class="w-full max-w-sm text-center">

        <div class="mb-8">
            <img src="{% static 'medien/Logo_Meer_erleben.png' %}" alt="Logo" class="h-12 mx-auto mb-4">
            <div class="text-5xl mb-4">✉️</div>
            <h1 class="text-2xl font-bold">E-Mail bestätigen</h1>
            <p class="text-base-content/60 mt-2 text-sm">
                Dein Verifikationslink ist abgelaufen oder du hast noch keine Bestätigungs-Mail erhalten.
            </p>
        </div>

        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-primary w-full">
                Neuen Link senden
            </button>
        </form>

        <p class="mt-4 text-sm text-base-content/50">
            <a href="{% url 'index' %}" class="link">Zurück zur Startseite</a>
        </p>

    </div>
</div>
{% endblock %}
