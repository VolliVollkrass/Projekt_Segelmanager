{% load static %}

{% if user.is_authenticated %}
<nav class="fixed bottom-0 left-0 right-0 z-50 bg-base-100 border-t border-base-300 shadow-lg lg:hidden">
  <div class="flex justify-around items-center h-16">

    <!-- Meine Törns -->
    <a href="{% url 'crew_overview' %}"
       class="flex flex-col items-center gap-0.5 px-3 py-2 rounded-lg transition-colors
              {% if request.resolver_match.url_name == 'crew_overview' %}text-primary{% else %}text-base-content/60 hover:text-primary{% endif %}">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
      </svg>
      <span class="text-xs font-medium">Meine Törns</span>
    </a>

    <!-- Entdecken -->
    <a href="{% url 'index' %}"
       class="flex flex-col items-center gap-0.5 px-3 py-2 rounded-lg transition-colors
              {% if request.resolver_match.url_name == 'index' %}text-primary{% else %}text-base-content/60 hover:text-primary{% endif %}">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/>
      </svg>
      <span class="text-xs font-medium">Entdecken</span>
    </a>

    {% if user.is_anbieter or user.is_staff %}
    <!-- Anbieter -->
    <a href="{% url 'anbieter_dashboard' %}"
       class="flex flex-col items-center gap-0.5 px-3 py-2 rounded-lg transition-colors
              {% if request.resolver_match.url_name == 'anbieter_dashboard' %}text-primary{% else %}text-base-content/60 hover:text-primary{% endif %}">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414A1 1 0 0121 9.414V19a2 2 0 01-2 2z"/>
      </svg>
      <span class="text-xs font-medium">Anbieter</span>
    </a>
    {% endif %}

    <!-- Profil -->
    <a href="{% url 'my_account' %}"
       class="flex flex-col items-center gap-0.5 px-3 py-2 rounded-lg transition-colors
              {% if request.resolver_match.url_name == 'my_account' %}text-primary{% else %}text-base-content/60 hover:text-primary{% endif %}">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
      </svg>
      <span class="text-xs font-medium">Profil</span>
    </a>

  </div>
</nav>

{% else %}
<!-- Nicht eingeloggt: Minimale Bottom-Nav -->
<nav class="fixed bottom-0 left-0 right-0 z-50 bg-base-100 border-t border-base-300 shadow-lg lg:hidden">
  <div class="flex justify-around items-center h-16">

    <a href="{% url 'index' %}"
       class="flex flex-col items-center gap-0.5 px-3 py-2 rounded-lg text-base-content/60 hover:text-primary transition-colors">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/>
      </svg>
      <span class="text-xs font-medium">Entdecken</span>
    </a>

    <a href="{% url 'login' %}"
       class="flex flex-col items-center gap-0.5 px-3 py-2 rounded-lg text-base-content/60 hover:text-primary transition-colors">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/>
      </svg>
      <span class="text-xs font-medium">Login</span>
    </a>

    <a href="{% url 'register' %}"
       class="flex flex-col items-center gap-0.5 px-3 py-2 rounded-lg text-base-content/60 hover:text-primary transition-colors">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/>
      </svg>
      <span class="text-xs font-medium">Registrieren</span>
    </a>

  </div>
</nav>
{% endif %}
