{% extends "base.html" %}
{% load static %}

{% block title %}{{ knoten.name }} – Segelwissen{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto px-4 py-6">

  <!-- Back -->
  <a href="{% url 'segelwissen_uebersicht' %}?tab=knoten"
     class="btn btn-ghost btn-sm mb-4 pl-0">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
    </svg>
    Knotenkunde
  </a>

  <!-- Header -->
  <div class="flex items-center gap-3 mb-4">
    <h1 class="text-2xl font-bold flex-1">{{ knoten.name }}</h1>
    <span class="badge badge-lg
      {% if knoten.schwierigkeitsgrad == 'leicht' %}badge-success
      {% elif knoten.schwierigkeitsgrad == 'mittel' %}badge-warning
      {% else %}badge-error{% endif %}">
      {{ knoten.get_schwierigkeitsgrad_display }}
    </span>
  </div>

  <!-- Bild -->
  {% if knoten.bild %}
  <figure class="rounded-2xl overflow-hidden mb-6">
    <img src="{{ knoten.bild.url }}" alt="{{ knoten.name }}" class="w-full object-cover max-h-80">
  </figure>
  {% endif %}

  <!-- Beschreibung -->
  <div class="card card-border bg-base-100">
    <div class="card-body p-5">
      <div class="prose max-w-none text-base-content/80">
        {{ knoten.beschreibung|linebreaks }}
      </div>
    </div>
  </div>

</div>
{% endblock %}
